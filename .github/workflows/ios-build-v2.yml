name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        required: true
        type: choice
        default: unsigned
        options:
          - unsigned
          - adhoc
          - appstore

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force latest
        run: git fetch origin master && git reset --hard origin/master && git log --oneline -3
      - name: Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app && xcodebuild -version
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.3
          channel: stable
      - run: flutter pub get
      - name: Fix pbxproj
        run: |
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          BEFORE=$(wc -l < "$PBX" | tr -d ' ')
          echo "Lines before: $BEFORE"
          # Remove stray }; that appears right before rootObject
          sed -i '' -e '/^[[:space:]]*};$/{ N; /rootObject/{ s/^.*\n//; }; }' "$PBX"
          AFTER=$(wc -l < "$PBX" | tr -d ' ')
          echo "Lines after: $AFTER"
      - name: Pod install
        run: cd ios && rm -rf Pods Podfile.lock && pod install --repo-update && cd ..
      - name: Build unsigned IPA
        run: |
          flutter build ipa --release --no-codesign
          mkdir -p Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -r Netsignory_unsigned.ipa Payload/
          rm -rf Payload
          ls -lh Netsignory_unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: Netsignory-ipa
          path: Netsignory_unsigned.ipa