name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        required: true
        type: choice
        default: unsigned
        options:
          - unsigned
          - adhoc
          - appstore

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force latest
        run: git fetch origin master && git reset --hard origin/master && git log --oneline -3
      - name: Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app && xcodebuild -version
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: stable
      - run: flutter pub get
      - name: Pod install
        run: cd ios && rm -rf Pods Podfile.lock && pod deintegrate 2>/dev/null || true && pod install --repo-update && cd ..
      - name: Build IPA
        run: |
          flutter build ipa --release --no-codesign
          mkdir -p build/ios/ipa
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>development</string></dict></plist>' > /tmp/e.plist
          xcodebuild -exportArchive -archivePath build/ios/archive/Runner.xcarchive -exportPath build/ios/ipa -exportOptionsPlist /tmp/e.plist -allowProvisioningUpdates 2>/dev/null || true
          ls -la build/ios/ipa/
      - uses: actions/upload-artifact@v4
        with:
          name: Netsignory-ipa
          path: build/ios/ipa/*.ipa