name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: Build mode
        required: true
        type: choice
        default: unsigned
        options:
          - unsigned
          - adhoc
          - appstore

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Force latest
        run: git fetch origin master && git reset --hard origin/master && git log --oneline -3
      - name: Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app && xcodebuild -version
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.3
          channel: stable
      - run: flutter pub get
      - name: Pod install
        run: cd ios && rm -rf Pods Podfile.lock && pod deintegrate 2>/dev/null || true && pod install --repo-update && cd ..
      - name: Build unsigned IPA
        run: |
          flutter build ipa --release --no-codesign
          echo "=== xcarchive contents ==="
          ls -la build/ios/archive/Runner.xcarchive/Products/Applications/
          echo "=== Creating IPA manually ==="
          mkdir -p build/ios/ipa/Payload
          cp -R "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "../Netsignory_unsigned.ipa" Payload/
          cd ../..
          ls -lh build/ios/Netsignory_unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: Netsignory-ipa
          path: build/ios/Netsignory_unsigned.ipa